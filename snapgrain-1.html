<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snapgrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1208;
    --paper:     #f7f3ed;
    --cream:     #e8e1d6;
    --sepia:     #c4a882;
    --rust:      #b85c38;
    --rust-dark: #8f3f22;
    --mist:      #8a8278;
    --card:      #ffffff;
    --shadow:    rgba(26,18,8,0.10);
  }

  html, body { height: 100%; }
  body {
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── pages ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── AUTH ── */
  #auth-page {
    min-height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse 80% 60% at 70% 30%, rgba(196,168,130,.2) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(184,92,56,.09) 0%, transparent 60%);
  }
  #auth-page.active { display: flex; }

  .auth-card {
    background: var(--card);
    border: 1px solid var(--cream);
    border-radius: 3px;
    padding: 50px 46px;
    width: 100%;
    max-width: 410px;
    box-shadow: 0 8px 48px var(--shadow);
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo { font-family: 'Playfair Display', serif; font-size: 30px; letter-spacing: -.5px; }
  .auth-logo em { color: var(--rust); font-style: italic; }
  .auth-tagline { font-size: 13px; color: var(--mist); margin: 6px 0 36px; letter-spacing: .3px; }

  .tabs { display: flex; border-bottom: 1px solid var(--cream); margin-bottom: 28px; }
  .tab-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    padding: 10px 0; font-size: 12px; letter-spacing: .7px; text-transform: uppercase;
    color: var(--mist); border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all .2s; font-family: 'DM Sans', sans-serif;
  }
  .tab-btn.active { color: var(--rust); border-color: var(--rust); font-weight: 500; }

  .field-label {
    display: block; font-size: 11px; letter-spacing: .8px;
    text-transform: uppercase; color: var(--mist); margin: 18px 0 6px;
  }
  .field-input {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--cream); border-radius: 2px;
    background: var(--paper); font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--ink); outline: none; transition: border-color .2s;
  }
  .field-input:focus { border-color: var(--sepia); }

  .btn-primary {
    width: 100%; margin-top: 26px; padding: 13px;
    background: var(--rust); border: none; border-radius: 2px;
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: .9px;
    text-transform: uppercase; cursor: pointer; transition: background .2s;
  }
  .btn-primary:hover { background: var(--rust-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .auth-err {
    margin-top: 14px; font-size: 13px; color: var(--rust);
    text-align: center; min-height: 18px;
  }

  /* ── APP ── */
  #app-page { display: none; flex-direction: column; min-height: 100vh; }
  #app-page.active { display: flex; }

  /* topbar */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,243,237,.92); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--cream);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 58px;
  }
  .topbar-logo { font-family: 'Playfair Display', serif; font-size: 22px; }
  .topbar-logo em { color: var(--rust); font-style: italic; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .user-chip { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--mist); }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--sepia); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; text-transform: uppercase; flex-shrink: 0;
  }
  .btn-ghost {
    background: none; border: 1px solid var(--cream); border-radius: 2px;
    padding: 6px 14px; font-size: 12px; letter-spacing: .5px;
    color: var(--mist); cursor: pointer; transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-ghost:hover { border-color: var(--sepia); color: var(--ink); }

  /* upload strip */
  .upload-strip {
    background: #ede8df;
    border-bottom: 1px solid rgba(196,168,130,.4);
    padding: 18px 28px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .upload-zone {
    flex: 1; min-width: 200px;
    border: 1.5px dashed var(--sepia); border-radius: 2px;
    padding: 14px 18px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,.5); user-select: none;
  }
  .upload-zone:hover { background: rgba(255,255,255,.85); border-color: var(--rust); }
  .upload-icon { font-size: 24px; opacity: .75; }
  .upload-hint strong { display: block; font-size: 14px; color: var(--ink); font-weight: 500; }
  .upload-hint span { font-size: 12px; color: var(--mist); }

  #preview-wrap { display: none; align-items: center; gap: 14px; flex: 1; flex-wrap: wrap; }
  #preview-wrap.show { display: flex; }
  #preview-img { width: 52px; height: 52px; object-fit: cover; border-radius: 2px; border: 1px solid var(--sepia); flex-shrink: 0; }
  #caption-input {
    flex: 1; min-width: 160px; padding: 11px 14px;
    border: 1px solid var(--cream); border-radius: 2px;
    background: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--ink); outline: none; transition: border-color .2s;
  }
  #caption-input:focus { border-color: var(--sepia); }

  .btn-share {
    padding: 11px 22px; background: var(--rust); border: none; border-radius: 2px;
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: .8px;
    text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: background .2s;
  }
  .btn-share:hover { background: var(--rust-dark); }
  .btn-share:disabled { opacity: .5; cursor: not-allowed; }
  .btn-cancel {
    background: none; border: 1px solid var(--cream); border-radius: 2px;
    padding: 10px 14px; font-size: 18px; cursor: pointer; color: var(--mist);
    line-height: 1; transition: all .2s;
  }
  .btn-cancel:hover { border-color: var(--rust); color: var(--rust); }

  /* feed */
  .feed-wrap { max-width: 980px; margin: 0 auto; padding: 36px 24px; width: 100%; }
  .feed-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 28px; }
  .feed-title { font-family: 'Playfair Display', serif; font-size: 26px; }
  #photo-count { font-size: 13px; color: var(--mist); }

  .photo-grid { columns: 3; column-gap: 18px; }
  @media (max-width: 720px) { .photo-grid { columns: 2; } }
  @media (max-width: 440px) { .photo-grid { columns: 1; } }

  .photo-card {
    break-inside: avoid; margin-bottom: 18px;
    background: var(--card); border: 1px solid var(--cream); border-radius: 2px;
    overflow: hidden; box-shadow: 0 2px 14px var(--shadow);
    transition: box-shadow .25s, transform .25s;
    animation: fadeUp .3s ease both;
  }
  .photo-card:hover { box-shadow: 0 8px 36px rgba(26,18,8,.14); transform: translateY(-2px); }
  .photo-card img { width: 100%; display: block; object-fit: cover; background: var(--cream); }
  .photo-meta { padding: 14px 16px 16px; }
  .photo-caption { font-size: 14px; line-height: 1.55; margin-bottom: 10px; }
  .photo-footer { display: flex; align-items: center; justify-content: space-between; }
  .photo-author { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--mist); }
  .author-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--sepia); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
  }
  .photo-time { font-size: 11px; color: var(--sepia); }

  .actions { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .like-btn {
    background: none; border: none; cursor: pointer; padding: 4px 6px;
    display: flex; align-items: center; gap: 5px; font-size: 12px;
    color: var(--mist); transition: color .2s; border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
  }
  .like-btn:hover, .like-btn.liked { color: var(--rust); }
  .like-btn .heart { font-size: 15px; transition: transform .15s; display: inline-block; }
  .like-btn:hover .heart, .like-btn.liked .heart { transform: scale(1.25); }
  .delete-btn {
    background: none; border: none; cursor: pointer; padding: 4px 7px;
    font-size: 14px; color: var(--cream); transition: all .2s; border-radius: 2px;
  }
  .delete-btn:hover { color: var(--rust); background: rgba(184,92,56,.08); }

  /* states */
  .state-msg {
    text-align: center; padding: 80px 0;
    font-family: 'Playfair Display', serif; font-size: 20px;
    color: var(--sepia); font-style: italic;
  }
  .loading-msg { text-align: center; padding: 60px 0; font-size: 13px; color: var(--mist); }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--cream); border-top-color: var(--sepia);
    border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* toast */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--ink); color: #fff; padding: 10px 24px;
    border-radius: 2px; font-size: 13px; z-index: 9999;
    opacity: 0; pointer-events: none; transition: all .25s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page" class="page">
  <div class="auth-card">
    <div class="auth-logo">snap<em>grain</em></div>
    <p class="auth-tagline">A quiet place for photographs</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Sign In</button>
      <button class="tab-btn" data-tab="signup">Join</button>
    </div>

    <label class="field-label" for="auth-name">Name</label>
    <input id="auth-name" class="field-input" type="text" placeholder="your name" />

    <label class="field-label" for="auth-pass">Password</label>
    <input id="auth-pass" class="field-input" type="password" placeholder="••••••••" />

    <button id="auth-btn" class="btn-primary">Sign In</button>
    <p id="auth-err" class="auth-err"></p>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page" class="page">

  <!-- topbar -->
  <header class="topbar">
    <div class="topbar-logo">snap<em>grain</em></div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="avatar" id="user-avatar">?</div>
        <span id="user-name-label"></span>
      </div>
      <button class="btn-ghost" id="signout-btn">Sign out</button>
    </div>
  </header>

  <!-- upload strip -->
  <div class="upload-strip">
    <input type="file" id="file-input" accept="image/*" style="display:none" />

    <!-- zone (shown when no file picked) -->
    <div class="upload-zone" id="upload-zone">
      <span class="upload-icon">📷</span>
      <div class="upload-hint">
        <strong>Choose a photo</strong>
        <span>Click to browse your library</span>
      </div>
    </div>

    <!-- preview (shown after file picked) -->
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview" />
      <input id="caption-input" class="" type="text" placeholder="Add a caption…" />
      <button class="btn-share" id="share-btn">Share</button>
      <button class="btn-cancel" id="cancel-btn">✕</button>
    </div>
  </div>

  <!-- feed -->
  <main class="feed-wrap">
    <div class="feed-header">
      <h1 class="feed-title">Recent Photos</h1>
      <span id="photo-count"></span>
    </div>
    <div id="photo-grid" class="photo-grid"></div>
  </main>
</div>

<!-- toast -->
<div id="toast"></div>

<script>
  const SUPABASE_URL = "https://muyevssqiuvhcozgxtlp.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11eWV2c3NxaXV2aGNvemd4dGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTE4NTQsImV4cCI6MjA5Mzk4Nzg1NH0.jzN6V1UArKq5epxK3tTXuo1cGukH5oKD9qAi1FQWGUU";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ── utils ── */
  const fakeEmail = n => `${n.toLowerCase().replace(/\s+/g,"_")}@photos.app`;

  function timeAgo(ts) {
    const s = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (s < 60)    return "just now";
    if (s < 3600)  return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
  }

  function showPage(id) {
    ["auth-page","app-page"].forEach(p => {
      document.getElementById(p).classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
  }

  /* ── auth state ── */
  let currentUser = null;

  sb.auth.onAuthStateChange((_event, session) => {
    currentUser = session?.user ?? null;
    if (currentUser) {
      const name = currentUser.user_metadata?.display_name || currentUser.email;
      document.getElementById("user-name-label").textContent = name;
      document.getElementById("user-avatar").textContent = name[0].toUpperCase();
      showPage("app-page");
      loadPhotos();
    } else {
      showPage("auth-page");
    }
  });

  /* ── tabs ── */
  let authMode = "login";
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      authMode = btn.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("auth-btn").textContent = authMode === "login" ? "Sign In" : "Create Account";
      document.getElementById("auth-err").textContent = "";
    });
  });

  /* ── auth submit ── */
  async function doAuth() {
    const name = document.getElementById("auth-name").value.trim();
    const pass = document.getElementById("auth-pass").value;
    const errEl = document.getElementById("auth-err");
    const btn   = document.getElementById("auth-btn");
    if (!name || !pass) { errEl.textContent = "Name and password required."; return; }
    errEl.textContent = "";
    btn.disabled = true;
    btn.textContent = "Please wait…";
    try {
      if (authMode === "signup") {
        const { error } = await sb.auth.signUp({
          email: fakeEmail(name), password: pass,
          options: { data: { display_name: name } }
        });
        if (error) throw error;
        toast("Welcome to Snapgrain!");
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: fakeEmail(name), password: pass });
        if (error) throw error;
      }
    } catch(e) {
      errEl.textContent = e.message;
      btn.disabled = false;
      btn.textContent = authMode === "login" ? "Sign In" : "Create Account";
    }
  }

  document.getElementById("auth-btn").addEventListener("click", doAuth);
  ["auth-name","auth-pass"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") doAuth(); });
  });

  /* ── sign out ── */
  document.getElementById("signout-btn").addEventListener("click", () => sb.auth.signOut());

  /* ── file pick ── */
  let pickedFile = null;

  document.getElementById("upload-zone").addEventListener("click", () => {
    document.getElementById("file-input").click();
  });

  document.getElementById("file-input").addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    pickedFile = f;
    document.getElementById("preview-img").src = URL.createObjectURL(f);
    document.getElementById("upload-zone").style.display = "none";
    document.getElementById("preview-wrap").classList.add("show");
  });

  document.getElementById("cancel-btn").addEventListener("click", resetUpload);
  function resetUpload() {
    pickedFile = null;
    document.getElementById("file-input").value = "";
    document.getElementById("caption-input").value = "";
    document.getElementById("preview-img").src = "";
    document.getElementById("upload-zone").style.display = "";
    document.getElementById("preview-wrap").classList.remove("show");
  }

  /* ── upload ── */
  document.getElementById("share-btn").addEventListener("click", uploadPhoto);
  document.getElementById("caption-input").addEventListener("keydown", e => { if (e.key === "Enter") uploadPhoto(); });

  async function uploadPhoto() {
    if (!pickedFile || !currentUser) return;
    const btn = document.getElementById("share-btn");
    btn.disabled = true; btn.textContent = "Sharing…";
    try {
      const ext  = pickedFile.name.split(".").pop();
      const path = `${currentUser.id}/${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage.from("Photos").upload(path, pickedFile);
      if (upErr) throw upErr;
      const { data: { publicUrl } } = sb.storage.from("Photos").getPublicUrl(path);
      const name = currentUser.user_metadata?.display_name || currentUser.email;
      const caption = document.getElementById("caption-input").value.trim();
      const { error: dbErr } = await sb.from("photos").insert({
        user_id: currentUser.id, username: name,
        url: publicUrl, caption,
        storage_path: path, likes: 0, liked_by: []
      });
      if (dbErr) throw new Error(dbErr.message + " CODE:" + dbErr.code + " HINT:" + dbErr.hint);
      toast("Photo shared!");
      resetUpload();
      loadPhotos();
    } catch(e) {
      toast("Error: " + e.message);
    } finally {
      btn.disabled = false; btn.textContent = "Share";
    }
  }

  /* ── load photos ── */
  async function loadPhotos() {
    const grid = document.getElementById("photo-grid");
    const countEl = document.getElementById("photo-count");
    grid.innerHTML = `<div class="loading-msg"><span class="spinner"></span>Loading photos…</div>`;
    const { data, error } = await sb.from("photos").select("*").order("created_at", { ascending: false });
    if (error) { grid.innerHTML = `<p class="state-msg">Could not load photos.</p>`; return; }
    const photos = data || [];
    countEl.textContent = `${photos.length} ${photos.length === 1 ? "photo" : "photos"}`;
    if (!photos.length) {
      grid.innerHTML = `<div class="state-msg" style="column-span:all">No photos yet — be the first to share one.</div>`;
      return;
    }
    grid.innerHTML = "";
    photos.forEach((p, i) => {
      const card = buildCard(p, i);
      grid.appendChild(card);
    });
  }

  function buildCard(p, i) {
    const uid    = currentUser?.id;
    const liked  = (p.liked_by || []).includes(uid);
    const isOwner = p.user_id === uid;

    const card = document.createElement("div");
    card.className = "photo-card";
    card.style.animationDelay = `${i * 0.04}s`;
    card.dataset.id = p.id;

    card.innerHTML = `
      <img src="${p.url}" alt="${escHtml(p.caption || "photo")}" loading="lazy" />
      <div class="photo-meta">
        ${p.caption ? `<p class="photo-caption">${escHtml(p.caption)}</p>` : ""}
        <div class="photo-footer">
          <div class="photo-author">
            <div class="author-dot">${(p.username || "?")[0].toUpperCase()}</div>
            ${escHtml(p.username || "unknown")}
          </div>
          <span class="photo-time">${timeAgo(p.created_at)}</span>
        </div>
        <div class="actions">
          <button class="like-btn${liked ? " liked" : ""}" data-id="${p.id}">
            <span class="heart">${liked ? "♥" : "♡"}</span>
            <span class="like-count">${p.likes > 0 ? p.likes : ""}</span>
          </button>
          ${isOwner ? `<button class="delete-btn" data-id="${p.id}" title="Delete">🗑</button>` : ""}
        </div>
      </div>`;

    card.querySelector(".like-btn")?.addEventListener("click", () => toggleLike(p));
    card.querySelector(".delete-btn")?.addEventListener("click", () => deletePhoto(p));
    return card;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ── like ── */
  async function toggleLike(photo) {
    const uid   = currentUser.id;
    const liked = (photo.liked_by || []).includes(uid);
    const liked_by = liked
      ? photo.liked_by.filter(x => x !== uid)
      : [...(photo.liked_by || []), uid];
    const likes = liked_by.length;

    // optimistic UI
    const card = document.querySelector(`.photo-card[data-id="${photo.id}"]`);
    if (card) {
      const btn   = card.querySelector(".like-btn");
      const heart = card.querySelector(".heart");
      const count = card.querySelector(".like-count");
      btn.classList.toggle("liked", !liked);
      heart.textContent = liked ? "♡" : "♥";
      count.textContent = likes > 0 ? likes : "";
    }

    photo.liked_by = liked_by;
    photo.likes    = likes;
    await sb.from("photos").update({ likes, liked_by }).eq("id", photo.id);
  }

  /* ── delete ── */
  async function deletePhoto(photo) {
    if (!confirm("Delete this photo?")) return;
    await sb.storage.from("Photos").remove([photo.storage_path]);
    await sb.from("photos").delete().eq("id", photo.id);
    document.querySelector(`.photo-card[data-id="${photo.id}"]`)?.remove();
    const remaining = document.querySelectorAll(".photo-card").length;
    document.getElementById("photo-count").textContent = `${remaining} ${remaining===1?"photo":"photos"}`;
    if (!remaining) {
      document.getElementById("photo-grid").innerHTML =
        `<div class="state-msg" style="column-span:all">No photos yet — be the first to share one.</div>`;
    }
    toast("Deleted.");
  }
</script>
</body>
</html>
